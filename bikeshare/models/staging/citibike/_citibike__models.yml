version: 2

models:
  - name: stg_citibike__trips
    description: |
      Cleaned, type-cast view over raw.citibike_trips. Mirrors the shape of
      stg_capitalbikeshare__trips so they can be unioned in the intermediate
      layer without column-by-column reconciliation.
    columns:
      - name: ride_id
        description: >
          NOT unique in this view — the source republishes some month-boundary
          rides in two adjacent monthly files. Uniqueness is enforced downstream
          in fct_rides (dedup + delete+insert).
        tests:
          - not_null
      - name: started_at
        tests:
          - not_null
      - name: ended_at
        tests:
          - not_null
      - name: rideable_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['classic_bike', 'electric_bike']
      - name: member_casual
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['member', 'casual']
      - name: system
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['citibike']