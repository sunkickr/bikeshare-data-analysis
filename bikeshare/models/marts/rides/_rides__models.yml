version: 2

models:
  - name: fct_rides
    description: |
      One row per ride, with derived columns the dashboard needs (duration,
      hour, day-of-week, night-owl flag, etc.). Filtered to physically
      possible rides only (ended_at >= started_at).
    columns:
      - name: ride_id
        description: Unique identifier of the ride.
        tests:
          - unique
          - not_null
      - name: started_at
        tests:
          - not_null
      - name: duration_seconds
        description: Ride duration in seconds. Always >= 0 by construction.
        tests:
          - not_null
      - name: started_dow
        description: ISO day-of-week, 1=Monday through 7=Sunday.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6, 7]
                quote: false
      - name: member_casual
        tests:
          - accepted_values:
              arguments:
                values: ['member', 'casual']
      - name: system
        description: Bikeshare system this ride came from.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['capitalbikeshare', 'citibike']

  - name: dim_stations
    description: |
      One row per unique station observed in either the start or end position
      of a ride. Most-recent observation wins on name/coordinate updates.
    # `tests:` directly under the model (not under a column) runs against the
    # whole model — useful for composite-key uniqueness, since dbt's built-in
    # `unique` test only works on a single column.
    tests:
      - dbt_utils.unique_combination_of_columns:           # (we'll install dbt_utils in a moment)
          arguments:
            combination_of_columns:
              - system
              - station_id
    columns:
      - name: station_id
        tests:
          - not_null
      - name: system
        tests:
          - not_null

  - name: agg_rides_by_neighborhood
    description: |
      One row per DC OSM neighbourhood per month. Joins fct_rides to the
      dc_station_neighborhoods seed (420 DC stations) and the
      dc_neighborhood_population seed (Census ACS 2023). Derived metrics
      (per-resident, per-km², member %) are computed at query time so
      multi-month aggregations stay mathematically correct.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - neighborhood_name
              - started_month
    columns:
      - name: neighborhood_name
        tests:
          - not_null
      - name: started_month
        tests:
          - not_null
      - name: weekday_rides
        description: Rides that started Monday–Friday (started_dow 1–5).
      - name: weekend_rides
        description: Rides that started Saturday–Sunday (started_dow 6–7).
      - name: electric_rides
        description: Rides taken on an electric bike.
      - name: round_trip_rides
        description: Rides that started and ended at the same station (is_round_trip = true).
      - name: night_owl_rides
        description: Rides starting midnight–5am (is_night_owl = true, started_hour 0–4).
      - name: arrival_rides
        description: Rides that ended in this zone (bucketed by started_at month per project convention).
      - name: station_count
        description: Number of stations mapped to this zone in the seed CSV.

  - name: agg_rides_by_cluster
    description: |
      One row per DC planning cluster per month. Uses the 39 official DC
      planning clusters instead of OSM neighbourhood polygons. Identical
      structure to agg_rides_by_neighborhood — allows side-by-side comparison
      of the two boundary definitions in the dashboard.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - cluster_id
              - started_month
    columns:
      - name: cluster_id
        tests:
          - not_null
      - name: started_month
        tests:
          - not_null
      - name: weekday_rides
        description: Rides that started Monday–Friday (started_dow 1–5).
      - name: weekend_rides
        description: Rides that started Saturday–Sunday (started_dow 6–7).
      - name: electric_rides
        description: Rides taken on an electric bike.
      - name: round_trip_rides
        description: Rides that started and ended at the same station (is_round_trip = true).
      - name: night_owl_rides
        description: Rides starting midnight–5am (is_night_owl = true, started_hour 0–4).
      - name: arrival_rides
        description: Rides that ended in this zone (bucketed by started_at month per project convention).
      - name: station_count
        description: Number of stations mapped to this zone in the seed CSV.

  - name: agg_rides_by_tract
    description: |
      One row per DC Census tract per month. Uses TIGER 2023 tract boundaries
      (~179 tracts). Population and income data is exact — tracts are the native
      ACS unit, so no spatial interpolation is needed. Identical column structure
      to agg_rides_by_neighborhood and agg_rides_by_cluster.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - tract_geoid
              - started_month
    columns:
      - name: tract_geoid
        description: 11-digit Census GEOID (e.g. 11001000100). Join key to seeds and GeoJSON.
        tests:
          - not_null
      - name: started_month
        tests:
          - not_null
      - name: weekday_rides
        description: Rides that started Monday–Friday (started_dow 1–5).
      - name: weekend_rides
        description: Rides that started Saturday–Sunday (started_dow 6–7).
      - name: electric_rides
        description: Rides taken on an electric bike.
      - name: round_trip_rides
        description: Rides that started and ended at the same station (is_round_trip = true).
      - name: night_owl_rides
        description: Rides starting midnight–5am (is_night_owl = true, started_hour 0–4).
      - name: arrival_rides
        description: Rides that ended in this zone (bucketed by started_at month per project convention).
      - name: station_count
        description: Number of stations mapped to this tract in the seed CSV.

  - name: agg_rides_by_block_group
    description: |
      One row per DC Census block group per month. Uses TIGER 2023 block group
      boundaries (~450 block groups). Block groups are the finest Census geography
      with ACS income/population data (~2–5 per tract). Population data is exact —
      no spatial interpolation needed. Identical column structure to the other agg models.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - bg_geoid
              - started_month
    columns:
      - name: bg_geoid
        description: 12-digit Census GEOID (e.g. 110010001001). Join key to seeds and GeoJSON.
        tests:
          - not_null
      - name: started_month
        tests:
          - not_null
      - name: weekday_rides
        description: Rides that started Monday–Friday (started_dow 1–5).
      - name: weekend_rides
        description: Rides that started Saturday–Sunday (started_dow 6–7).
      - name: electric_rides
        description: Rides taken on an electric bike.
      - name: round_trip_rides
        description: Rides that started and ended at the same station (is_round_trip = true).
      - name: night_owl_rides
        description: Rides starting midnight–5am (is_night_owl = true, started_hour 0–4).
      - name: arrival_rides
        description: Rides that ended in this zone (bucketed by started_at month per project convention).
      - name: station_count
        description: Number of stations mapped to this block group in the seed CSV.

  - name: agg_rides_daily
    description: |
      Daily ride counts and duration metrics, sliced by system, member type,
      and bike type. Backs the daily-distribution charts on the dashboard.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - started_date
              - system
              - member_casual
              - rideable_type
    columns:
      - name: started_date
        tests:
          - not_null
      - name: total_rides
        description: Number of rides started on this date in this segment.
        tests:
          - not_null